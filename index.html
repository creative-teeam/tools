<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>旅行計画サポートアプリ</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Maps JS API（必須：あなたのAPIキーに変更）-->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBoqcTHl2l19zUjH6b7UwViX_BuJWn66Uo&libraries=places&callback=initMap"
    async
    defer
  ></script>
</head>
<body>
  <header>
    <h1>旅行計画サポートアプリ</h1>
  </header>

  <main>
    <!-- 左ペイン：入力フォーム -->
    <section id="controls">
      <h2>1. 一日の行動モデル作成</h2>
      <div class="card">
        <label>
          出発時間：
          <input type="time" id="startTime" value="09:00" />
        </label>
        <label>
          戻り時間：
          <input type="time" id="endTime" value="20:00" />
        </label>
        <label>
          滞在したいスポット（カンマ区切り）：
          <input
            type="text"
            id="spotsInput"
            placeholder="例：浅草寺, 東京スカイツリー, 上野公園"
          />
        </label>
        <button id="generateScheduleBtn">モデルを作成</button>
        <div id="scheduleResult"></div>
      </div>

      <h2>2. ホテルプラン比較</h2>
      <div class="card">
        <label>
          宿泊地（都市名）：
          <input
            type="text"
            id="hotelCity"
            placeholder="例：東京"
            value="東京"
          />
        </label>
        <button id="compareHotelsBtn">ホテルプランを表示</button>
        <table id="hotelTable">
          <thead>
            <tr>
              <th>ホテル名</th>
              <th>価格（1泊）</th>
              <th>評価</th>
              <th>駅からの距離</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <h2>3. 周辺施設検索</h2>
      <div class="card">
        <label>
          目的地（住所や地名）：
          <input
            type="text"
            id="centerLocation"
            placeholder="例：浅草寺"
          />
        </label>
        <label>
          ジャンル：
          <select id="placeType">
            <option value="restaurant">レストラン</option>
            <option value="cafe">カフェ</option>
            <option value="tourist_attraction">観光スポット</option>
            <option value="lodging">ホテル</option>
            <option value="shopping_mall">ショッピングモール</option>
          </select>
        </label>
        <button id="searchPlacesBtn">周辺施設を表示</button>
        <ul id="placesList"></ul>
      </div>

      <h2>4. 最短ルート算出</h2>
      <div class="card">
        <p>複数地点を回るルートを最適化します（Google Directions API利用）</p>
        <label>
          出発地：
          <input
            type="text"
            id="routeStart"
            placeholder="例：東京駅"
          />
        </label>
        <label>
          経由地（カンマ区切り）：
          <input
            type="text"
            id="routeWaypoints"
            placeholder="例：浅草寺, 東京スカイツリー, 上野公園"
          />
        </label>
        <label>
          終点（空欄なら出発地に戻る）：
          <input
            type="text"
            id="routeEnd"
            placeholder="例：東京駅"
          />
        </label>
        <button id="calcRouteBtn">最短ルートを計算</button>
        <div id="routeInfo"></div>
      </div>
    </section>

    <!-- 右ペイン：地図 -->
    <section id="mapSection">
      <h2>地図表示</h2>
      <div id="map"></div>
    </section>
  </main>

  <footer>
    <p>旅行計画サンプルアプリ</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
